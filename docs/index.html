<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
    #player { width: 100%; height: 100%; }
  </style>
</head>
<body>
  <div id="player"></div>
  <script src="https://www.youtube.com/iframe_api"></script>
  <script>
    var player;
    var videoId = new URLSearchParams(location.search).get('v') || '';
    var autoplay = new URLSearchParams(location.search).get('autoplay') === '1';

    function post(msg) {
      if (window.ReactNativeWebView) window.ReactNativeWebView.postMessage(JSON.stringify(msg));
    }

    var STATE_NAMES = { '-1': 'unstarted', '0': 'ended', '1': 'playing', '2': 'paused', '3': 'buffering', '5': 'cued' };

    function onYouTubeIframeAPIReady() {
      player = new YT.Player('player', {
        videoId: videoId,
        playerVars: {
          autoplay: autoplay ? 1 : 0,
          controls: 0,
          modestbranding: 1,
          rel: 0,
          iv_load_policy: 3,
          playsinline: 1,
          fs: 0,
        },
        events: {
          onReady: function() { post({ type: 'ready' }); },
          onStateChange: function(e) {
            post({ type: 'stateChange', state: STATE_NAMES[String(e.data)] || 'unknown' });
          },
          onError: function(e) { post({ type: 'error', code: e.data }); },
        },
      });
    }

    // Called by the WebView via injectJavaScript
    function play()  { player && player.playVideo(); }
    function pause() { player && player.pauseVideo(); }
  </script>
</body>
</html>
